project:
  type: website
  output-dir: _site
  render:
    - task1.qmd
    - task2.qmd
    - task3.qmd
    - task4.qmd
    - task5.qmd
    - task6.qmd
    - task7.qmd
    - index.qmd
  resources:
    - "*.png"
    - "*.jpg"
    - "downloads/"

execute:
  freeze: auto
  cache: true

website:
  title: "量化交易入门 — 作业"
  page-navigation: true
  bread-crumbs: true
  favicon: favicon.svg

  sidebar:
    style: docked
    background: light
    width: 300px
    collapse-level: 2
    border: true
    align: left
    contents:
      - section: "量化交易入门 — 作业"
        href: index.html
        contents:
          - text: "Task 1 — 模拟数据涨跌盘"
            href: task1.html
          - text: "Task 2 — 股票数据获取"
            href: task2.html
          - text: "Task 3 — 趋势模拟与识别"
            href: task3.html
          - text: "Task 4 — 双均线策略回测"
            href: task4.html
          - text: "Task 5 — 理解波动率"
            href: task5.html
          - text: "Task 6 — 夏普比率"
            href: task6.html
          - text: "Task 7 — 最大回撤与仓位管理"
            href: task7.html

  page-footer:
    left: |
      <a href="https://github.com/meowsquant/homework" target="_blank">GitHub</a> · 量化交易入门作业
    center: |
      <strong>本量化数据报告不构成投资建议，仅个人间讨论，切勿模仿。</strong>
    right: |
      Built with [Quarto](https://quarto.org)

format:
  html:
    theme:
      - cosmo
      - theme.scss
    css: theme.css
    toc: true
    toc-location: left
    toc-title: "本页目录"
    toc-depth: 2
    number-sections: true
    number-depth: 3
    code-fold: false
    code-copy: true
    highlight-style: tango
    mainfont: "Source Sans Pro"
    monofont: "Roboto Mono"
    lang: zh
    fig-dpi: 96
    fig-width: 8
    fig-height: 4
    include-in-header:
      text: |
        <a href="https://github.com/meowsquant/homework" target="_blank" class="github-corner" aria-label="View source on GitHub">
