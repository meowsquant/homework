<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化作业导航</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 640px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 48px 40px 40px;
            transition: all 0.2s;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .subtitle {
            color: #6b7280;
            font-size: 16px;
            margin-bottom: 32px;
            border-left: 4px solid #3b82f6;
            padding-left: 16px;
            background: #f0f4ff;
            border-radius: 0 8px 8px 0;
            line-height: 1.6;
        }
        .task-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .task-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f9fafb;
            border-radius: 16px;
            padding: 16px 20px;
            text-decoration: none;
            color: #1f2937;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            border: 1px solid #e5e7eb;
        }
        .task-card:hover {
            background: #eff6ff;
            border-color: #93bbfc;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.10);
            transform: translateY(-2px);
        }
        .task-card:active {
            transform: scale(0.98);
        }
        .task-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .task-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #3b82f6;
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            flex-shrink: 0;
        }
        .task-name {
            font-size: 17px;
            font-weight: 500;
        }
        .task-arrow {
            color: #9ca3af;
            font-size: 18px;
            transition: transform 0.2s;
        }
        .task-card:hover .task-arrow {
            transform: translateX(4px);
            color: #3b82f6;
        }
        .footer {
            margin-top: 36px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #9ca3af;
        }
        .footer a {
            color: #3b82f6;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            .container { padding: 28px 20px; }
            h1 { font-size: 22px; }
            .task-card { padding: 14px 16px; }
            .task-name { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 量化作业</h1>
        <div class="subtitle">
            选择下方任务查看对应的完整报告
        </div>

        <div class="task-grid">
            <a href="task1_files/" class="task-card">
                <div class="task-info">
                    <span class="task-number">1</span>
                    <span class="task-name">任务一：数据探索与可视化</span>
                </div>
                <span class="task-arrow">→</span>
            </a>
            <a href="task2_files/" class="task-card">
                <div class="task-info">
                    <span class="task-number">2</span>
                    <span class="task-name">任务二：因子分析与回测</span>
                </div>
                <span class="task-arrow">→</span>
            </a>
            <a href="task3_files/" class="task-card">
                <div class="task-info">
                    <span class="task-number">3</span>
                    <span class="task-name">任务三：策略构建与优化</span>
                </div>
                <span class="task-arrow">→</span>
            </a>
            <a href="task4_files/" class="task-card">
                <div class="task-info">
                    <span class="task-number">4</span>
                    <span class="task-name">任务四：综合回测与绩效</span>
                </div>
                <span class="task-arrow">→</span>
            </a>
        </div>

        <div class="footer">
            <span>📁 量化初学者作业 · 2026</span>
            <a href="https://github.com/YachengY/quant-for-beginner-homework" target="_blank">View on GitHub</a>
        </div>
    </div>
</body>
</html>
